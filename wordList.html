<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="wordList.css">
  <title>Memory Aid: Word Collection & Story Generator</title>
</head>

<body>


  <h3>My Vocabulary <a href="https://www.context-dictionary.com/" target="_blank" class="about-link">About</a></h3>

  <div style="margin-bottom: 15px;">
    <button id="study-mode-button" class="btn-primary">Study Mode</button>
    <span id="due-count" style="margin-left: 10px; font-weight: bold; color: #d9534f;"></span>
    <button id="story-button" class="btn-secondary">Generate AI Story</button>
    <button id="story-settings-btn" style="margin-left: 5px;">⚙️</button>
    <div id="story-settings" style="display: none; margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 8px;">
      <label>Story style: 
        <select id="story-style">
          <option value="engaging">Engaging</option>
          <option value="funny">Funny</option>
          <option value="dramatic">Dramatic</option>
          <option value="mysterious">Mysterious</option>
        </select>
      </label>
      <label style="margin-left: 15px;">Length: 
        <select id="story-length">
          <option value="x">X/Twitter (~100 words)</option>
          <option value="short">Short (~200 words)</option>
          <option value="medium" selected>Medium (~300 words)</option>
          <option value="long">Long (~500 words)</option>
        </select>
      </label>
    </div>
    <div id="story-container" style="display: none; margin-top: 15px; padding: 20px; background: #f9f9f9; border-radius: 12px; border: 1px solid #e0e0e0;">
      <div id="story-loading" style="display: none; text-align: center; padding: 20px;">
        <p>Generating story with AI... ✨</p>
        <div class="spinner"></div>
      </div>
      <div id="story-content"></div>
      <div id="story-share" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e0e0e0;">
        <button class="share-btn share-x" data-platform="x" style="background: #000; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-right: 8px;">
          Share to 𝕏
        </button>
        <button class="share-btn share-fb" data-platform="facebook" style="background: #1877f2; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-right: 8px;">
          Facebook
        </button>
        <button class="share-btn share-copy" data-platform="copy" style="background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em;">
          📋 Copy
        </button>
        <span id="share-status" style="margin-left: 10px; color: #28a745; font-size: 0.9em; display: none;">Copied!</span>
      </div>
      <div id="story-error" style="display: none; color: #d9534f; padding: 10px;"></div>
    </div>
  </div>

  <div id="study-container" style="display: none;">
    <div id="flashcard">
      <div id="flashcard-front">
        <div id="flashcard-word"></div>
        <button id="tts-button" title="Play pronunciation">🔊</button>
      </div>
      <div id="flashcard-back" style="display: none;">
        <div id="flashcard-meaning" style="font-size: 1.3em; font-weight: bold; color: #2c5282; margin-bottom: 15px; padding: 10px; background: #ebf8ff; border-radius: 8px;"></div>
        <div id="flashcard-context"></div>
        <div id="flashcard-source"></div>
      </div>
    </div>
    <div id="flashcard-controls" style="display: none;">
      <button id="show-answer-btn">Show Answer</button>
      <div id="rating-buttons" style="display: none;">
        <button class="rating-btn rating-again" data-rating="1">Again<br><span class="interval-hint" id="again-interval"></span></button>
        <button class="rating-btn rating-hard" data-rating="2">Hard<br><span class="interval-hint" id="hard-interval"></span></button>
        <button class="rating-btn rating-good" data-rating="3">Good<br><span class="interval-hint" id="good-interval"></span></button>
        <button class="rating-btn rating-easy" data-rating="4">Easy<br><span class="interval-hint" id="easy-interval"></span></button>
      </div>
    </div>
    <div id="study-stats">
      <span id="cards-remaining"></span>
      <button id="exit-study-btn">Exit Study Mode</button>
    </div>
    <div id="study-complete" style="display: none;">
      <h4>All caught up!</h4>
      <p>No cards due for review.</p>
      <button id="study-complete-exit">Back to Word List</button>
    </div>
  </div>

  <div id="stats-container">
    <div id="stats-summary">
      <div class="stat-card">
        <div class="stat-value" id="stat-total-words">0</div>
        <div class="stat-label">Total Words</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-words-learned">0</div>
        <div class="stat-label">Words Learned</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-accuracy">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-today-reviews">0</div>
        <div class="stat-label">Today's Reviews</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-today-correct">0</div>
        <div class="stat-label">Today's Correct</div>
      </div>
    </div>
    <div id="stats-chart-container">
      <h4>Last 7 Days Activity</h4>
      <div id="stats-chart"></div>
    </div>
  </div>

  <div style="margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 15px;">
    <span id="word-count" style="font-weight: bold; color: #333;"></span>
    <div>
      <input type="text" id="search-input" placeholder="Search words..." style="padding: 8px 12px; width: 300px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em;">
      <button id="clear-search" style="margin-left: 5px;">Clear</button>
    </div>
  </div>

  <div id="messages-container">

  </div>
  <script src="wordList.js"></script>

</body>

</html>
